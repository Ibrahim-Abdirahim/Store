spring.application.name=store

# --- Database connection ---
spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# Hibernate auto-creates/updates tables from our @Entity classes on startup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- Server ---
server.port=8080

# --- JWT ---
# Secret used to sign tokens (in production this would be an environment variable)
app.jwt.secret=ChangeThisToALongRandomSecretKeyForJWTSigningAtLeast256BitsLong
app.jwt.expiration-ms=86400000

# --- CORS ---
# Allows our React app on port 5173 to call this API
app.cors.allowed-origins=http://localhost:5173
